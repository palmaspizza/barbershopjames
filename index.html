<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas Barbería | James</title>
    <link rel="icon" href="https://i.ibb.co/JFrnTqWc/c4497cf0-2f10-43bf-b5ac-6c232c4d0e18.jpg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --barber-red: #ff3b3f;
            --barber-red-light: #ffcccb;
            --barber-blue: #2089ff;
            --barber-gold: #e4a64f;
            --barber-black: #0b0b0d;
            --barber-surface: #15161a;
            --barber-text: #f1f1f1;
            --barber-muted: #c2c2c2;
            --barber-green: #33d17a;
            --barber-orange: #ff7a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(1200px 600px at 30% 0%, #131418 0%, #0c0d10 60%);
            color: var(--barber-text);
            margin: 0;
            padding: 10px;
            font-size: clamp(14px, 2.5vw, 17px);
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--barber-surface);
            padding: clamp(15px, 4vw, 25px);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 5px;
            background: repeating-linear-gradient(45deg, var(--barber-red) 0 10px, #fff 10px 20px, var(--barber-blue) 20px 30px);
            animation: barberPole 15s linear infinite;
        }

        @keyframes barberPole {
            0% { background-position: 0 0; }
            100% { background-position: 200px 0; }
        }

        #logo {
            width: clamp(140px, 35vw, 180px);
            height: clamp(140px, 35vw, 180px);
            background-image: url('https://i.ibb.co/JFrnTqWc/c4497cf0-2f10-43bf-b5ac-6c232c4d0e18.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            margin: 10px auto 20px;
            border: 3px solid var(--barber-gold);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--barber-gold);
            margin: 15px 0;
        }

        button {
            background: linear-gradient(180deg, #2a2c31, #1a1b1e);
            color: var(--barber-text);
            border: 1px solid rgba(228,166,79,0.4);
            border-radius: 12px;
            padding: 10px 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border-color: var(--barber-gold);
        }

        .diaCalendario {
            padding: 10px 5px;
            min-height: 45px;
            border-radius: 10px;
            border: 1px solid rgba(228,166,79,0.3);
            background: #1e2024;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .diaLibre { background: linear-gradient(180deg, #224f33, #173924); }
        .diaOcupado { background: linear-gradient(180deg, #5a1f1f, #2a1414); }
        .diaBloqueado { background: var(--barber-red-light) !important; color: #333 !important; border-color: var(--barber-red); }
        .diaPasado { opacity: 0.4; pointer-events: none; filter: grayscale(1); }

        .dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            color: var(--barber-gold);
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 8px;
        }

        #cuadroCalendario {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .modal, .ventana-secreta {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content, .caja-misteriosa {
            background: #1a1b20;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            border: 2px solid var(--barber-gold);
            max-height: 80vh;
            overflow-y: auto;
        }

        .toggle-hora-btn {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            background: var(--barber-red);
            color: #fff;
            margin-bottom: 5px;
            width: 100%;
        }
        .toggle-hora-btn.activo { background: var(--barber-green); }

        .bloqueHora {
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            font-weight: bold;
            background: #24262c;
            border: 1px solid rgba(228,166,79,0.3);
        }
        .horaLibre { background: #255437; }
        .horaOcupada { background: #5a1f1f; opacity: 0.7; pointer-events: none; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0c0d10;
            border: 1px solid var(--barber-gold);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .reserva-item {
            background: #24262c;
            padding: 10px;
            margin: 8px 0;
            border-left: 5px solid var(--barber-orange);
            border-radius: 5px;
            text-align: left;
        }

        .fantasma, .hidden { display: none !important; }

        @media (max-width: 400px) {
            .diaCalendario { min-height: 40px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="logo"></div>
    
    <div id="barraMes" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px;">
        <button id="mesAnterior">←</button>
        <h2 id="tituloMes" style="margin: 0; min-width: 140px;"></h2>
        <button id="mesSiguiente">→</button>
    </div>

    <div style="margin-bottom: 15px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        <button id="activarBloqueo" style="background: var(--barber-orange); color: #000;">Bloquear Días</button>
        <button id="desactivarBloqueo" class="hidden" style="background: var(--barber-green);">Terminar Bloqueo</button>
        <button onclick="activarGestionHorarios()" style="background: var(--barber-blue);">Gestionar Horas</button>
    </div>

    <div class="dias-semana">
        <div>LUN</div><div>MAR</div><div>MIÉ</div><div>JUE</div><div>VIE</div><div>SÁB</div><div>DOM</div>
    </div>
    <div id="cuadroCalendario"></div>

    <div id="seccionReservas" style="margin-top: 30px;">
        <h3 style="color: var(--barber-red);">Reservas Confirmadas</h3>
        <input type="text" id="buscador" placeholder="Buscar reserva...">
        <div id="lista-reservas"></div>
    </div>
</div>

<!-- MODALS -->
<div id="modal-login" class="ventana-secreta fantasma">
    <div class="caja-misteriosa">
        <h3>Acceso Administrador</h3>
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="login()">Entrar</button>
        <button onclick="cerrarModal('modal-login')" style="background: #444;">Cerrar</button>
    </div>
</div>

<div id="modal-admin" class="ventana-secreta fantasma">
    <div class="caja-misteriosa">
        <h3>Panel Control</h3>
        <button onclick="borrarTodo()" style="background: #000; width: 100%; margin-bottom: 10px;">Borrar TODO</button>
        <button onclick="mostrarBotonesX(); cerrarModal('modal-admin')" style="background: var(--barber-orange); width: 100%; margin-bottom: 10px;">Borrar Individuales</button>
        <button onclick="cerrarModal('modal-admin')" style="background: #444; width: 100%;">Cerrar</button>
    </div>
</div>

<div id="modal-horas" class="modal fantasma">
    <div class="modal-content">
        <h3 id="fecha-titulo"></h3>
        <div id="grid-horas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        <button onclick="cerrarModal('modal-horas')" style="margin-top: 15px; width: 100%; background: #444;">Cerrar</button>
    </div>
</div>

<div id="modal-reserva" class="modal fantasma">
    <div class="modal-content">
        <h3>Confirmar Cita</h3>
        <p id="reserva-info"></p>
        <input type="text" id="cliente-nombre" placeholder="Tu nombre">
        <button id="btn-confirmar" style="background: var(--barber-green); width: 100%; margin-bottom: 10px;">Confirmar WhatsApp</button>
        <button onclick="cerrarModal('modal-reserva')" style="background: #444; width: 100%;">Cancelar</button>
    </div>
</div>

<div id="modal-config-horas" class="ventana-secreta fantasma">
    <div class="caja-misteriosa">
        <h3 id="config-fecha-titulo">Configurar Horas</h3>
        <p style="font-size: 0.8em; margin-bottom: 10px;">Toca para cambiar disponibilidad</p>
        <div id="toggle-horas-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;"></div>
        <button onclick="guardarConfigHoras()" style="background: var(--barber-green); width: 100%; margin-bottom: 8px;">Guardar</button>
        <button onclick="cerrarModal('modal-config-horas')" style="background: #444; width: 100%;">Cancelar</button>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBHLlV9HDfa1v-Uz4YVcbt3vQGByhNFYus",
        authDomain: "jeisonstyle-1530f.firebaseapp.com",
        databaseURL: "https://jeisonstyle-1530f-default-rtdb.firebaseio.com",
        projectId: "jeisonstyle-1530f",
        storageBucket: "jeisonstyle-1530f.firebasestorage.app",
        messagingSenderId: "40159402096",
        appId: "1:40159402096:web:d54b2d9a2dd990c1203cb5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const resRef = db.ref("reservas");
    const horRef = db.ref("horarios");
    const bloqRef = db.ref("diasBloqueados");

    // State
    let currDate = new Date();
    let bloqMode = false;
    let gestMode = false;
    let blockedDays = [];
    let customHours = {};
    let dailyRes = {};
    let selectedDate = "";
    let selectedHour = "";

    const baseHours = ["11:00", "12:00", "13:00", "14:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "21:30"];
    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        updateCalendar();
        setupFirebase();
        setupUI();
        longPress(document.getElementById("logo"), () => openModal("modal-login"));
    });

    function setupFirebase() {
        resRef.on("value", snap => {
            dailyRes = {};
            document.getElementById("lista-reservas").innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                if (!dailyRes[r.fecha]) dailyRes[r.fecha] = [];
                dailyRes[r.fecha].push(r.hora);
                addResItem(r, child.key);
            });
            renderCalendar();
        });

        bloqRef.on("value", snap => {
            blockedDays = [];
            snap.forEach(child => blockedDays.push(child.val().fecha));
            renderCalendar();
        });

        horRef.on("value", snap => {
            customHours = snap.val() || {};
            renderCalendar();
        });
    }

    function setupUI() {
        document.getElementById("mesAnterior").onclick = () => { currDate.setMonth(currDate.getMonth() - 1); updateCalendar(); };
        document.getElementById("mesSiguiente").onclick = () => { currDate.setMonth(currDate.getMonth() + 1); updateCalendar(); };
        document.getElementById("activarBloqueo").onclick = () => { bloqMode = true; toggleBtn("activarBloqueo", "desactivarBloqueo"); renderCalendar(); };
        document.getElementById("desactivarBloqueo").onclick = () => { bloqMode = false; toggleBtn("desactivarBloqueo", "activarBloqueo"); renderCalendar(); };
        document.getElementById("buscador").oninput = (e) => {
            const t = e.target.value.toLowerCase();
            document.querySelectorAll(".reserva-item").forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(t) ? "block" : "none";
            });
        };
        document.getElementById("btn-confirmar").onclick = confirmRes;
    }

    function renderCalendar() {
        const grid = document.getElementById("cuadroCalendario");
        grid.innerHTML = "";
        const y = currDate.getFullYear(), m = currDate.getMonth();
        const first = new Date(y, m, 1).getDay();
        const total = new Date(y, m + 1, 0).getDate();
        const offset = first === 0 ? 6 : first - 1;
        const hoy = new Date(); hoy.setHours(0,0,0,0);

        for (let i = 0; i < offset; i++) grid.appendChild(document.createElement("div"));

        for (let d = 1; d <= total; d++) {
            const fStr = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
            const btn = document.createElement("button");
            btn.className = "diaCalendario";
            btn.textContent = d;
            
            const dObj = new Date(y, m, d);
            const isPast = dObj < hoy;
            const isBloq = blockedDays.includes(fStr);
            const hours = customHours[fStr] || baseHours;
            const isFull = (dailyRes[fStr] || []).length >= hours.length;

            if (isPast) btn.classList.add("diaPasado");
            else if (isBloq) btn.classList.add("diaBloqueado");
            else if (isFull) btn.classList.add("diaOcupado");
            else btn.classList.add("diaLibre");

            btn.onclick = () => handleDayClick(fStr, isBloq, isPast);
            grid.appendChild(btn);
        }
    }

    function handleDayClick(f, isBloq, isPast) {
        if (isPast) return;
        if (bloqMode) {
            if (isBloq) bloqRef.once("value", s => s.forEach(c => { if(c.val().fecha === f) c.ref.remove(); }));
            else bloqRef.push({ fecha: f });
        } else if (gestMode) {
            selectedDate = f;
            openConfigHours(f);
        } else if (!isBloq) {
            openHours(f);
        }
    }

    function openHours(f) {
        selectedDate = f;
        document.getElementById("fecha-titulo").textContent = f;
        const grid = document.getElementById("grid-horas");
        grid.innerHTML = "";
        const res = dailyRes[f] || [];
        const hours = customHours[f] || baseHours;

        hours.forEach(h => {
            const b = document.createElement("button");
            const taken = res.includes(h);
            b.className = "bloqueHora " + (taken ? "horaOcupada" : "horaLibre");
            b.textContent = (taken ? "⛔ " : "✅ ") + h;
            if (!taken) b.onclick = () => { selectedHour = h; openResModal(f, h); };
            grid.appendChild(b);
        });
        openModal("modal-horas");
    }

    function openResModal(f, h) {
        closeModal("modal-horas");
        document.getElementById("reserva-info").textContent = `${f} a las ${h}`;
        openModal("modal-reserva");
    }

    function confirmRes() {
        const n = document.getElementById("cliente-nombre").value.trim();
        if (!n) return alert("Ingresa tu nombre");
        resRef.push({ nombre: n, fecha: selectedDate, hora: selectedHour }).then(() => {
            const msg = `Hola, reservé para el ${selectedDate} a las ${selectedHour}. Nombre: ${n}`;
            window.open(`https://wa.me/56954527837?text=${encodeURIComponent(msg)}`, "_blank");
            closeModal("modal-reserva");
            document.getElementById("cliente-nombre").value = "";
        });
    }

    function openConfigHours(f) {
        document.getElementById("config-fecha-titulo").textContent = f;
        const grid = document.getElementById("toggle-horas-grid");
        grid.innerHTML = "";
        const active = customHours[f] || baseHours;

        baseHours.forEach(h => {
            const b = document.createElement("button");
            const isActive = active.includes(h);
            b.className = "toggle-hora-btn " + (isActive ? "activo" : "");
            b.textContent = h + (isActive ? " - Disponible" : " - No Disponible");
            b.onclick = () => {
                const nowActive = b.classList.toggle("activo");
                b.textContent = h + (nowActive ? " - Disponible" : " - No Disponible");
            };
            grid.appendChild(b);
        });
        openModal("modal-config-horas");
    }

    function guardarConfigHoras() {
        const hours = [];
        document.querySelectorAll("#toggle-horas-grid .activo").forEach(b => hours.push(b.textContent.split(" - ")[0]));
        horRef.child(selectedDate).set(hours).then(() => {
            closeModal("modal-config-horas");
            gestMode = false;
            renderCalendar();
        });
    }

    function addResItem(r, k) {
        const item = document.createElement("div");
        item.className = "reserva-item";
        item.innerHTML = `<strong>${r.fecha} | ${r.hora}</strong> - ${r.nombre}`;
        const x = document.createElement("span");
        x.innerHTML = " | ❌";
        x.className = "boton-x hidden";
        x.style.cursor = "pointer";
        x.onclick = () => confirm("¿Borrar?") && resRef.child(k).remove();
        item.appendChild(x);
        document.getElementById("lista-reservas").prepend(item);
    }

    // Helpers
    function updateCalendar() {
        document.getElementById("tituloMes").textContent = `${monthNames[currDate.getMonth()]} ${currDate.getFullYear()}`;
        renderCalendar();
    }
    function openModal(id) { document.getElementById(id).classList.remove("fantasma"); }
    function closeModal(id) { document.getElementById(id).classList.add("fantasma"); }
    function toggleBtn(hide, show) { document.getElementById(hide).classList.add("hidden"); document.getElementById(show).classList.remove("hidden"); }
    function login() { if(document.getElementById("pass").value === "1234") { closeModal("modal-login"); openModal("modal-admin"); document.getElementById("pass").value=""; } else alert("Clave mal"); }
    function longPress(el, fn) { let t; const s = () => t = setTimeout(fn, 2500); const c = () => clearTimeout(t); el.onmousedown = s; el.onmouseup = c; el.onmouseleave = c; el.ontouchstart = s; el.ontouchend = c; }
    function activarGestionHorarios() { gestMode = true; alert("Toca un día para cambiar sus horas"); }
    function mostrarBotonesX() { document.querySelectorAll(".boton-x").forEach(b => b.classList.remove("hidden")); }
    function borrarTodo() { if(confirm("¿Borrar TODO?")) resRef.remove(); }
</script>
</body>
</html>
